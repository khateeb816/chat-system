<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #090d16 0%, #111322 100%);
      --card-bg: rgba(17, 24, 39, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --border-focus: #818cf8;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent-grad: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      --accent-hover: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);
      --success-color: #10b981;
      --success-glow: rgba(16, 185, 129, 0.25);
      --danger-color: #ef4444;
      --danger-glow: rgba(239, 68, 68, 0.25);
    }

    body {
      width: 320px;
      margin: 0;
      padding: 18px;
      background: var(--bg-gradient);
      color: var(--text-main);
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      overflow-x: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 12px;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      background: linear-gradient(135deg, #a5b4fc, #818cf8);
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(129, 140, 248, 0.6);
    }

    .logo-text {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 9999px;
      background: rgba(99, 102, 241, 0.15);
      color: #a5b4fc;
      border: 1px solid rgba(99, 102, 241, 0.20);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .input-wrapper {
      position: relative;
    }

    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      background-color: rgba(17, 24, 39, 0.5);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text-main);
      font-size: 13px;
      outline: none;
      transition: all 0.25s ease;
      font-family: inherit;
    }

    input[type="text"]:focus {
      border-color: var(--border-focus);
      background-color: rgba(17, 24, 39, 0.8);
      box-shadow: 0 0 12px rgba(129, 140, 248, 0.15);
    }

    button {
      cursor: pointer;
      font-weight: 600;
      border-radius: 10px;
      padding: 11px 16px;
      font-size: 13px;
      transition: all 0.2s ease;
      border: none;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--accent-grad);
      color: white;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(99, 102, 241, 0.3);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-toggle {
      background-color: rgba(31, 41, 55, 0.5);
      color: var(--text-main);
      border: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-toggle:hover {
      background-color: rgba(31, 41, 55, 0.8);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .btn-toggle.active {
      background: rgba(16, 185, 129, 0.1);
      color: var(--success-color);
      border: 1px solid rgba(16, 185, 129, 0.3);
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.1);
    }

    .btn-toggle.active:hover {
      background: rgba(16, 185, 129, 0.15);
    }

    .status-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
    }

    .status-lbl {
      color: var(--text-muted);
      font-weight: 500;
    }

    .status-val {
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .indicator-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
    }

    .indicator-dot.active {
      background-color: var(--success-color);
      box-shadow: 0 0 8px var(--success-color);
      animation: pulse 2s infinite;
    }

    .indicator-dot.inactive {
      background-color: var(--danger-color);
      box-shadow: 0 0 8px var(--danger-color);
    }

    @keyframes pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 var(--success-glow); }
      70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }

    .message-container {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 2px;
    }

    .message-log {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 11px;
      color: #cbd5e1;
      background-color: rgba(0, 0, 0, 0.35);
      padding: 10px 12px;
      border-radius: 8px;
      max-height: 48px;
      overflow-y: auto;
      word-break: break-all;
      border: 1px solid rgba(255, 255, 255, 0.04);
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo-container">
        <div class="logo-dot"></div>
        <div class="logo-text">YouTube Assistant</div>
      </div>
      <div class="badge">v1.0</div>
    </div>

    <div class="form-group">
      <label for="api-url">Message Fetch API URL</label>
      <div class="input-wrapper">
        <input type="text" id="api-url" placeholder="https://api.example.com/next-message" />
      </div>
    </div>

    <button id="save-btn" class="btn-primary">Save Config</button>
    <button id="toggle-btn" class="btn-toggle">
      <span class="indicator-dot inactive" id="btn-dot"></span>
      <span id="btn-text">Activate Automation</span>
    </button>

    <div class="status-card">
      <div class="status-row">
        <span class="status-lbl">Automation Status:</span>
        <span id="status-display" class="status-val" style="color: var(--danger-color)">
          <span class="indicator-dot inactive" id="status-dot"></span>
          Inactive
        </span>
      </div>
      <div class="status-row">
        <span class="status-lbl">Last Action Sent:</span>
        <span id="last-sent-time" class="status-val" style="color: var(--text-main)">—</span>
      </div>
      <div class="message-container">
        <label>Latest Response Message</label>
        <div id="last-msg-log" class="message-log">Waiting for response data...</div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
